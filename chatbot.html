<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Bible SPS – المساعد الروحي</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" crossorigin="anonymous" />
  <style>
    /* ─── Reset & Root ─── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary:   #06b6d4;
      --primary-d: #0e7490;
      --primary-l: #67e8f9;
      --accent:    #8b5cf6;
      --gold:      #f59e0b;

      --bg:        #09090b;
      --bg2:       #18181b;
      --bg3:       #27272a;
      --surface:   #1e1e21;
      --surface2:  #2a2a2e;
      --border:    #3f3f46;

      --text:      #fafafa;
      --text2:     #a1a1aa;
      --text3:     #71717a;

      --r-sm: 12px;
      --r-md: 18px;
      --r-lg: 24px;

      --shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    html, body {
      height: 100%;
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ─── Page Layout ─── */
    .page {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 800px;
      margin: 0 auto;
      padding: 0 12px;
    }

    /* ─── Header ─── */
    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 8px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      box-shadow: 0 0 0 3px rgba(6,182,212,0.2);
    }

    .header-info { flex: 1; }
    .header-info h1 {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }
    .header-info p {
      font-size: 0.75rem;
      color: var(--text3);
      margin-top: 1px;
    }

    .status-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #10b981;
      margin-left: 5px;
      vertical-align: middle;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    .header-logo {
      font-family: 'Amiri', serif;
      font-size: 0.78rem;
      color: var(--primary);
      text-align: center;
      line-height: 1.3;
      flex-shrink: 0;
    }
    .header-logo span {
      display: block;
      font-size: 0.65rem;
      color: var(--text3);
    }

    /* ─── Chat Area ─── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 4px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ─── Date Divider ─── */
    .date-divider {
      text-align: center;
      font-size: 0.7rem;
      color: var(--text3);
      position: relative;
    }
    .date-divider::before, .date-divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 30%;
      height: 1px;
      background: var(--border);
    }
    .date-divider::before { right: 0; }
    .date-divider::after  { left: 0; }

    /* ─── Message Row ─── */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      animation: fadeUp 0.3s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-row.user {
      flex-direction: row-reverse;
    }

    /* Avatar */
    .msg-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
    }
    .msg-row.bot  .msg-avatar { background: linear-gradient(135deg, var(--primary), var(--accent)); }
    .msg-row.user .msg-avatar { background: var(--bg3); color: var(--text2); }

    /* Bubble */
    .bubble {
      max-width: 72%;
      padding: 11px 15px;
      font-size: 0.91rem;
      line-height: 1.65;
      word-break: break-word;
      position: relative;
    }

    .msg-row.bot .bubble {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--r-md) var(--r-md) var(--r-md) 4px;
      color: var(--text);
    }

    .msg-row.user .bubble {
      background: linear-gradient(135deg, var(--primary-d), var(--primary));
      border-radius: var(--r-md) var(--r-md) 4px var(--r-md);
      color: #fff;
    }

    .bubble-time {
      display: block;
      font-size: 0.63rem;
      color: var(--text3);
      margin-top: 4px;
      text-align: left;
    }
    .msg-row.user .bubble-time { color: rgba(255,255,255,0.55); text-align: right; }

    /* ─── Welcome Card ─── */
    .welcome-card {
      background: linear-gradient(135deg, rgba(6,182,212,0.08), rgba(139,92,246,0.06));
      border: 1px solid rgba(6,182,212,0.2);
      border-radius: var(--r-lg);
      padding: 22px 20px;
      text-align: center;
      margin: 4px 0 8px;
    }
    .welcome-card .icon {
      font-size: 2rem;
      margin-bottom: 10px;
    }
    .welcome-card h2 {
      font-family: 'Amiri', serif;
      font-size: 1.1rem;
      color: var(--primary-l);
      margin-bottom: 6px;
    }
    .welcome-card p {
      font-size: 0.83rem;
      color: var(--text2);
      line-height: 1.7;
    }

    /* Quick Suggestions */
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 14px;
    }
    .sug-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-family: 'Cairo', sans-serif;
      font-size: 0.78rem;
      color: var(--text2);
      cursor: pointer;
      transition: all 0.2s;
    }
    .sug-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: rgba(6,182,212,0.07);
    }

    /* ─── Typing Indicator ─── */
    .typing-row { display: flex; align-items: flex-end; gap: 8px; }
    .typing-bubble {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--r-md) var(--r-md) var(--r-md) 4px;
      padding: 13px 18px;
      display: flex; gap: 5px; align-items: center;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--primary);
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40%            { transform: translateY(-6px); opacity: 1; }
    }

    /* ─── Error Toast ─── */
    .error-msg .bubble {
      background: rgba(239,68,68,0.1);
      border-color: rgba(239,68,68,0.3);
      color: #fca5a5;
    }

    /* ─── Input Bar ─── */
    .input-bar {
      padding: 12px 4px 18px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-wrap {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 8px 8px 8px 14px;
      transition: border-color 0.2s;
    }
    .input-wrap:focus-within {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(6,182,212,0.1);
    }

    #msg-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Cairo', sans-serif;
      font-size: 0.92rem;
      color: var(--text);
      resize: none;
      max-height: 120px;
      min-height: 28px;
      line-height: 1.5;
      direction: rtl;
    }
    #msg-input::placeholder { color: var(--text3); }

    .char-count {
      font-size: 0.65rem;
      color: var(--text3);
      align-self: flex-end;
      padding-bottom: 4px;
      flex-shrink: 0;
    }
    .char-count.warn { color: #f59e0b; }

    .send-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary-d), var(--primary));
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      font-size: 15px;
      color: #fff;
    }
    .send-btn:hover { transform: scale(1.07); box-shadow: 0 4px 12px rgba(6,182,212,0.4); }
    .send-btn:active { transform: scale(0.95); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* ─── Responsive ─── */
    @media (max-width: 480px) {
      .bubble { max-width: 85%; font-size: 0.88rem; }
      .header-logo { display: none; }
    }
  </style>
</head>
<body>

<div class="page">

  <!-- Header -->
  <header class="header">
    <div class="header-avatar">✝️</div>
    <div class="header-info">
      <h1>المساعد الروحي <span class="status-dot"></span></h1>
      <p>Daily Bible SPS — دايماً هنا معاك</p>
    </div>
    <div class="header-logo">
      📖 Daily Bible
      <span>SPS Platform</span>
    </div>
  </header>

  <!-- Chat Messages -->
  <div class="chat-area" id="chat-area">

    <div class="date-divider" id="today-label">اليوم</div>

    <!-- Welcome Card -->
    <div class="welcome-card" id="welcome-card">
      <div class="icon">🕊️</div>
      <h2>أهلاً وسهلاً بيك في Daily Bible SPS</h2>
      <p>أنا المساعد الروحي بتاعك — اسألني عن أي آية، أو شارك معايا أي سؤال في قلبك 🙏</p>
      <div class="suggestions">
        <button class="sug-btn" onclick="quickSend(this)">ما معنى المحبة في الكتاب المقدس؟</button>
        <button class="sug-btn" onclick="quickSend(this)">محتاج تشجيع النهارده</button>
        <button class="sug-btn" onclick="quickSend(this)">أية تعينني على الصلاة</button>
        <button class="sug-btn" onclick="quickSend(this)">ازاي أقرب لربنا؟</button>
      </div>
    </div>

  </div>

  <!-- Input Bar -->
  <div class="input-bar">
    <div class="input-wrap">
      <textarea
        id="msg-input"
        placeholder="اكتب رسالتك هنا…"
        rows="1"
        maxlength="500"
      ></textarea>
      <span class="char-count" id="char-count">500</span>
      <button class="send-btn" id="send-btn" title="إرسال">
        <i class="fa-solid fa-paper-plane fa-flip-horizontal"></i>
      </button>
    </div>
  </div>

</div>

<script>
  // ─── Config ───
  const GROQ_API_KEY = "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"; // ← ضع مفتاحك هنا
  const GROQ_MODEL   = "llama3-70b-8192";
  const MAX_CHARS    = 500;

  const SYSTEM_PROMPT = `أنت مساعد روحاني لطيف ودافي على منصة "Daily Bible SPS" التعليمية الروحية.
تكلم بالعربي المصري العامية الدافئة.
ردودك قصيرة ومفيدة وملهمة (٣–٥ جمل كحد أقصى).
استخدم آيات من الكتاب المقدس لما يكون مناسب.
أسلوبك: حنين، مشجع، وقريب من القلب. لا تكن رسمياً أو بارداً.`;

  // ─── State ───
  const conversationHistory = [];
  let isBusy = false;

  // ─── Elements ───
  const chatArea  = document.getElementById("chat-area");
  const input     = document.getElementById("msg-input");
  const sendBtn   = document.getElementById("send-btn");
  const charCount = document.getElementById("char-count");

  // ─── Auto-resize textarea ───
  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 120) + "px";

    const remaining = MAX_CHARS - input.value.length;
    charCount.textContent = remaining;
    charCount.classList.toggle("warn", remaining < 60);
  });

  // ─── Send on Enter (Shift+Enter = newline) ───
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  });

  sendBtn.addEventListener("click", handleSend);

  // ─── Quick suggestion buttons ───
  function quickSend(btn) {
    input.value = btn.textContent.trim();
    handleSend();
  }

  // ─── Main send handler ───
  async function handleSend() {
    const text = input.value.trim();
    if (!text || isBusy) return;

    // Hide welcome card after first message
    const welcome = document.getElementById("welcome-card");
    if (welcome) welcome.remove();

    // Show user message
    addMessage("user", text);

    // Clear input
    input.value = "";
    input.style.height = "auto";
    charCount.textContent = MAX_CHARS;
    charCount.classList.remove("warn");

    // Lock UI
    isBusy = true;
    sendBtn.disabled = true;

    // Build history
    conversationHistory.push({ role: "user", content: text });

    // Show typing indicator
    const typingEl = showTyping();

    try {
      const reply = await callGroq(conversationHistory);
      removeTyping(typingEl);
      conversationHistory.push({ role: "assistant", content: reply });
      addMessage("bot", reply);
    } catch (err) {
      removeTyping(typingEl);
      addMessage("bot", "حصلت مشكلة بسيطة… جرب تاني 🙏", true);
      console.error(err);
    } finally {
      isBusy = false;
      sendBtn.disabled = false;
      input.focus();
    }
  }

  // ─── Groq API call ───
  async function callGroq(messages) {
    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${GROQ_API_KEY}`
      },
      body: JSON.stringify({
        model: GROQ_MODEL,
        messages: [
          { role: "system", content: SYSTEM_PROMPT },
          ...messages
        ],
        max_tokens: 400,
        temperature: 0.75
      })
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    return data.choices?.[0]?.message?.content?.trim() || "مش قادر أرد دلوقتي 🙏";
  }

  // ─── Render message bubble ───
  function addMessage(who, text, isError = false) {
    const row = document.createElement("div");
    row.className = `msg-row ${who} ${isError ? "error-msg" : ""}`;

    const avatarIcon = who === "bot" ? "✝" : "👤";
    const time = new Date().toLocaleTimeString("ar-EG", { hour: "2-digit", minute: "2-digit" });

    row.innerHTML = `
      <div class="msg-avatar">${avatarIcon}</div>
      <div class="bubble">
        ${escapeHtml(text)}
        <span class="bubble-time">${time}</span>
      </div>`;

    chatArea.appendChild(row);
    scrollToBottom();
  }

  // ─── Typing indicator ───
  function showTyping() {
    const row = document.createElement("div");
    row.className = "typing-row";
    row.innerHTML = `
      <div class="msg-avatar">✝</div>
      <div class="typing-bubble">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>`;
    chatArea.appendChild(row);
    scrollToBottom();
    return row;
  }

  function removeTyping(el) {
    if (el && el.parentNode) el.parentNode.removeChild(el);
  }

  // ─── Helpers ───
  function scrollToBottom() {
    chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: "smooth" });
  }

  function escapeHtml(str) {
    const d = document.createElement("div");
    d.appendChild(document.createTextNode(str));
    return d.innerHTML.replace(/\n/g, "<br>");
  }

  // ─── Set today label ───
  document.getElementById("today-label").textContent =
    new Date().toLocaleDateString("ar-EG", { weekday: "long", day: "numeric", month: "long" });

  // Focus input on load
  input.focus();
</script>

</body>
</html>
