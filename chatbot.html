<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Bible SPS — مساعدك الروحي</title>

  <!-- Fonts matching the platform -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet" />
  <!-- Icons matching the platform -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <style>
    /* ════════════════════════════════════════════
       CSS VARIABLES — matches global.css exactly
    ════════════════════════════════════════════ */
    :root {
      --primary-400: #22d3ee;
      --primary-500: #06b6d4;
      --primary-600: #0891b2;
      --primary-700: #0e7490;
      --accent-500:  #8b5cf6;

      --bg-primary:       #09090b;
      --bg-secondary:     #18181b;
      --bg-tertiary:      #27272a;
      --surface:          #1e1e21;
      --surface-elevated: #2a2a2e;
      --surface-hover:    #35353a;

      --text-primary:   #fafafa;
      --text-secondary: #a1a1aa;
      --text-muted:     #71717a;

      --border:       #3f3f46;
      --border-light: #52525b;

      --shadow-md:   0 4px 6px -1px rgb(0 0 0/.1),0 2px 4px -2px rgb(0 0 0/.1);
      --shadow-lg:   0 10px 15px -3px rgb(0 0 0/.15),0 4px 6px -4px rgb(0 0 0/.1);
      --shadow-xl:   0 20px 25px -5px rgb(0 0 0/.2),0 8px 10px -6px rgb(0 0 0/.1);
      --shadow-glow: 0 0 20px rgb(6 182 212/.35);

      --radius-sm:  0.5rem;
      --radius-md:  0.75rem;
      --radius-lg:  1rem;
      --radius-xl:  1.25rem;
      --radius-2xl: 1.5rem;
      --radius-3xl: 2rem;

      --tr: 250ms cubic-bezier(0.4,0,0.2,1);
      --tr-bounce: 500ms cubic-bezier(0.68,-0.55,0.265,1.55);

      /* Chat-specific */
      --user-bubble: linear-gradient(135deg, var(--primary-500) 0%, var(--primary-700) 100%);
      --bot-bubble:  var(--surface-elevated);
    }

    /* ════════════════════════════════════════════
       BASE
    ════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { font-size: 15px; scroll-behavior: smooth; }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100dvh;
      overflow: hidden;
      direction: rtl;
    }

    /* Subtle radial glow top */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 70% 40% at 50% 0%, rgb(6 182 212 / .07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 30% at 90% 100%, rgb(139 92 246 / .05) 0%, transparent 55%);
    }

    /* ════════════════════════════════════════════
       LAYOUT
    ════════════════════════════════════════════ */
    .app {
      position: relative; z-index: 1;
      display: flex; align-items: center; justify-content: center;
      height: 100dvh; padding: 12px;
    }

    .chat-card {
      width: 100%; max-width: 700px;
      height: min(820px, calc(100dvh - 24px));
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-3xl);
      box-shadow: var(--shadow-xl), 0 0 0 1px rgb(6 182 212 / .06);
      display: flex; flex-direction: column; overflow: hidden;
    }

    /* ════════════════════════════════════════════
       HEADER
    ════════════════════════════════════════════ */
    .chat-header {
      padding: 16px 20px;
      background: var(--bg-tertiary);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
      flex-shrink: 0;
    }

    .header-avatar {
      width: 44px; height: 44px; border-radius: var(--radius-md);
      background: #111113;
      border: 1.5px solid rgb(255 255 255 / .13);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; flex-shrink: 0;
      box-shadow: var(--shadow-md), var(--shadow-glow);
      color: var(--primary-400);
    }

    .header-info { flex: 1; min-width: 0; }

    .header-name {
      font-size: 0.95rem; font-weight: 800;
      color: var(--text-primary);
      display: flex; align-items: center; gap: 8px;
    }

    .online-badge {
      display: inline-flex; align-items: center; gap: 4px;
      background: rgb(16 185 129 / .15);
      border: 1px solid rgb(16 185 129 / .3);
      border-radius: 20px;
      padding: 1px 8px;
      font-size: 0.65rem; font-weight: 600;
      color: #34d399;
    }

    .online-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: #34d399;
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:.5; transform:scale(.8); }
    }

    .header-sub {
      font-size: 0.75rem; color: var(--text-muted);
      margin-top: 1px;
    }

    .header-logo {
      font-size: 0.7rem; font-weight: 700;
      color: var(--text-muted); letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      flex-shrink: 0;
    }

    /* ════════════════════════════════════════════
       MESSAGES AREA
    ════════════════════════════════════════════ */
    .messages {
      flex: 1; overflow-y: auto;
      padding: 20px 18px;
      display: flex; flex-direction: column; gap: 12px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    /* ── Welcome ── */
    .welcome {
      text-align: center;
      padding: 20px 16px 8px;
      animation: fadeUp .5s ease both;
    }

    .welcome-icon-wrap {
      width: 64px; height: 64px;
      background: var(--surface-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
      color: var(--primary-400);
      margin-bottom: 14px;
      box-shadow: var(--shadow-glow);
    }

    .welcome h2 {
      font-size: 1.1rem; font-weight: 800;
      color: var(--text-primary); margin-bottom: 6px;
    }

    .welcome p {
      font-size: 0.82rem; color: var(--text-secondary);
      line-height: 1.75; max-width: 320px; margin: 0 auto;
      font-family: 'Amiri', serif;
    }

    /* ── Date divider ── */
    .divider {
      display: flex; align-items: center; gap: 10px;
      color: var(--text-muted); font-size: 0.72rem;
      padding: 2px 0;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* ── Message row ── */
    .msg-row {
      display: flex; align-items: flex-end; gap: 8px;
      animation: fadeUp .3s ease both;
    }
    .msg-row.user { flex-direction: row-reverse; }
    .msg-row.bot  { flex-direction: row; }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(12px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ── Avatar ── */
    .msg-avatar {
      width: 30px; height: 30px;
      border-radius: var(--radius-sm);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem;
    }

    .bot  .msg-avatar {
      background: #111113;
      border: 1px solid var(--border);
      color: var(--primary-400);
      box-shadow: var(--shadow-glow);
    }
    .user .msg-avatar {
      background: var(--surface-elevated);
      border: 1px solid var(--border);
      color: var(--text-secondary);
    }

    /* ── Wrap + bubble ── */
    .msg-wrap { display: flex; flex-direction: column; }
    .user .msg-wrap { align-items: flex-end; }
    .bot  .msg-wrap { align-items: flex-start; }

    .bubble {
      max-width: min(70%, 420px);
      padding: 10px 14px;
      border-radius: var(--radius-xl);
      font-size: 0.88rem;
      line-height: 1.7;
      word-break: break-word;
    }

    .user .bubble {
      background: var(--user-bubble);
      color: #fff;
      border-bottom-left-radius: var(--radius-sm);
      box-shadow: 0 4px 14px rgb(6 182 212 / .25);
    }

    .bot .bubble {
      background: var(--bot-bubble);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-bottom-right-radius: var(--radius-sm);
    }

    .bubble.error {
      background: rgb(239 68 68 / .1);
      border-color: rgb(239 68 68 / .3);
      color: #fca5a5;
    }

    /* ── Page tip inside bot bubble ── */
    .page-tip {
      margin-top: 10px;
      padding: 8px 12px;
      background: rgb(6 182 212 / .08);
      border: 1px solid rgb(6 182 212 / .2);
      border-radius: var(--radius-md);
      font-size: 0.78rem;
      color: var(--primary-400);
      display: flex; align-items: center; gap: 8px;
    }
    .page-tip i { font-size: 0.75rem; flex-shrink: 0; }

    .msg-time {
      font-size: 0.65rem; color: var(--text-muted);
      margin-top: 3px; padding: 0 3px;
    }

    /* ── Typing indicator ── */
    .typing-row { display: flex; align-items: flex-end; gap: 8px; }

    .typing-bubble {
      background: var(--surface-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      border-bottom-right-radius: var(--radius-sm);
      padding: 12px 16px;
      display: flex; align-items: center; gap: 4px;
    }

    .typing-bubble span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--primary-500);
      animation: bounce 1.2s ease-in-out infinite;
    }
    .typing-bubble span:nth-child(2) { animation-delay: .2s; }
    .typing-bubble span:nth-child(3) { animation-delay: .4s; }

    @keyframes bounce {
      0%,60%,100% { transform:translateY(0); opacity:.4; }
      30%          { transform:translateY(-6px); opacity:1; }
    }

    /* ════════════════════════════════════════════
       QUICK SUGGESTIONS
    ════════════════════════════════════════════ */
    .suggestions {
      padding: 0 18px 10px;
      display: flex; flex-wrap: wrap; gap: 7px;
      flex-shrink: 0;
    }

    .sug-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 6px 13px;
      color: var(--text-secondary);
      font-family: 'Cairo', sans-serif;
      font-size: 0.78rem; font-weight: 600;
      cursor: pointer;
      transition: all var(--tr);
      white-space: nowrap;
    }

    .sug-btn i { font-size: 0.72rem; color: var(--primary-500); }

    .sug-btn:hover {
      border-color: var(--primary-500);
      color: var(--primary-400);
      background: rgb(6 182 212 / .06);
      transform: translateY(-1px);
      box-shadow: var(--shadow-glow);
    }

    /* ════════════════════════════════════════════
       INPUT AREA
    ════════════════════════════════════════════ */
    .input-area {
      padding: 12px 16px 14px;
      background: var(--bg-tertiary);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-row {
      display: flex; align-items: flex-end; gap: 8px;
    }

    .input-wrap { flex: 1; position: relative; }

    #userInput {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 10px 48px 10px 14px;
      color: var(--text-primary);
      font-family: 'Cairo', sans-serif;
      font-size: 0.88rem;
      resize: none; max-height: 110px;
      line-height: 1.55; outline: none;
      transition: border-color var(--tr), box-shadow var(--tr);
    }

    #userInput::placeholder { color: var(--text-muted); }

    #userInput:focus {
      border-color: var(--primary-600);
      box-shadow: 0 0 0 3px rgb(6 182 212 / .08);
    }

    .char-badge {
      position: absolute; bottom: 9px; left: 14px;
      font-size: 0.65rem; color: var(--text-muted);
      pointer-events: none;
      transition: color var(--tr);
    }
    .char-badge.warn { color: #f87171; }

    /* ── Send button ── */
    #sendBtn {
      width: 42px; height: 42px;
      border-radius: var(--radius-md);
      background: var(--primary-500);
      border: none; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 0.95rem;
      transition: all var(--tr);
      box-shadow: 0 4px 12px rgb(6 182 212 / .3);
    }

    #sendBtn:hover:not(:disabled) {
      background: var(--primary-400);
      transform: scale(1.05);
      box-shadow: 0 6px 18px rgb(6 182 212 / .45);
    }

    #sendBtn:active:not(:disabled) { transform: scale(.95); }

    #sendBtn:disabled {
      opacity: .35; cursor: not-allowed; transform: none;
      box-shadow: none;
    }

    .footer-hint {
      text-align: center; margin-top: 7px;
      font-size: 0.68rem; color: var(--text-muted);
    }
    .footer-hint kbd {
      background: var(--surface-elevated);
      border: 1px solid var(--border);
      border-radius: 4px; padding: 1px 5px;
      font-size: 0.65rem; font-family: inherit;
      color: var(--text-secondary);
    }

    /* ════════════════════════════════════════════
       RESPONSIVE
    ════════════════════════════════════════════ */
    @media (max-width: 520px) {
      .app { padding: 0; }
      .chat-card { border-radius: 0; height: 100dvh; max-width: 100%; }
      .bubble { max-width: 82%; }
      .header-logo { display: none; }
    }
  </style>
</head>
<body>
<div class="app">
  <div class="chat-card">

    <!-- ── Header ── -->
    <header class="chat-header">
      <div class="header-avatar">
        <i class="fas fa-cross"></i>
      </div>
      <div class="header-info">
        <div class="header-name">
          مساعدك الروحي
          <span class="online-badge">
            <span class="online-dot"></span>
            متاح
          </span>
        </div>
        <div class="header-sub">بيساعدك تتعرف على المنصة وترحلتك الروحية</div>
      </div>
      <div class="header-logo">Daily Bible SPS</div>
    </header>

    <!-- ── Messages ── -->
    <div class="messages" id="messages">
      <div class="welcome">
        <div class="welcome-icon-wrap">
          <i class="fas fa-dove"></i>
        </div>
        <h2>أهلاً وسهلاً بيك! 👋</h2>
        <p>«ابدأ يومك بكلمة ربنا، وخلّي الإنجيل يكون صديقك اليومي»</p>
      </div>
      <div class="divider">ابدأ المحادثة</div>
    </div>

    <!-- ── Quick suggestions ── -->
    <div class="suggestions" id="suggestions">
      <button class="sug-btn" onclick="sendSuggestion(this)">
        <i class="fas fa-book-open"></i> إيه القراءة النهارده؟
      </button>
      <button class="sug-btn" onclick="sendSuggestion(this)">
        <i class="fas fa-running"></i> إزاي أشترك في الماراثون؟
      </button>
      <button class="sug-btn" onclick="sendSuggestion(this)">
        <i class="fas fa-heart"></i> محتاج تشجيع
      </button>
      <button class="sug-btn" onclick="sendSuggestion(this)">
        <i class="fas fa-moon"></i> آية قبل النوم
      </button>
      <button class="sug-btn" onclick="sendSuggestion(this)">
        <i class="fas fa-star"></i> إيه التحديات المتاحة؟
      </button>
      <button class="sug-btn" onclick="sendSuggestion(this)">
        <i class="fas fa-smile"></i> حاسس بحاجة تقيلة
      </button>
    </div>

    <!-- ── Input ── -->
    <div class="input-area">
      <div class="input-row">
        <div class="input-wrap">
          <textarea
            id="userInput"
            rows="1"
            maxlength="500"
            placeholder="اكتب رسالتك هنا..."
            aria-label="رسالتك"
          ></textarea>
          <span class="char-badge" id="charBadge"></span>
        </div>
        <button id="sendBtn" onclick="sendMessage()" disabled aria-label="إرسال">
          <i class="fas fa-paper-plane"></i>
        </button>
      </div>
      <p class="footer-hint">
        <kbd>Enter</kbd> للإرسال &nbsp;·&nbsp; <kbd>Shift+Enter</kbd> لسطر جديد
      </p>
    </div>

  </div><!-- /chat-card -->
</div><!-- /app -->

<script>
/* ════════════════════════════════════════════════════
   CONFIG
════════════════════════════════════════════════════ */
const GROQ_API_KEY = "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";
const MODEL        = "llama-3.3-70b-versatile";
const MAX_CHARS    = 500;

/* ── Platform knowledge: pages + purposes ── */
const PLATFORM_CONTEXT = `
أنت مساعد روحاني ذكي وودود من منصة "Daily Bible SPS" التعليمية الروحية للطلاب.
بتتكلم باللهجة المصرية العامية — دافئ، مرح، بشوش، وبسيط.
ردودك قصيرة ومفيدة (3-5 جمل). استخدم الكتاب المقدس كمرجع عند الحاجة.

صفحات المنصة اللي بتعرفها كويس:

1. القراءات اليومية (readings.php):
   - الطالب بيقرأ آيات من الكتاب المقدس محددة ليه حسب مرحلته
   - في أسئلة بعد كل قراءة (اختيار من متعدد وأسئلة مفتوحة)
   - بتجمع نقاط على كل قراءة وإجابة صح

2. ماراثون الكتاب المقدس (marathon.php):
   - تحدي جماعي لقراءة الكتاب المقدس كامل
   - بتتابع التقدم على شكل نسبة مئوية وأيام
   - في ليدربورد للطلاب

3. ماراثون المدرسين (teachers-marathon.php):
   - نفس فكرة الماراثون بس للمدرسين

4. نسخ ودراسة الكتاب للمدرسين (teacher-bible-study.php):
   - منصة متكاملة للمدرسين لنسخ ودراسة الكتاب المقدس

5. لوحة الطالب (student-dashboard.php):
   - بتشوف فيها نقاطك، إنجازاتك، streak القراءة
   - في هيتماب للأيام اللي قرأت فيها
   - بيانات أسبوعية وشهرية

6. التحديات الروحية (challenges.php):
   - تحديات روحية ممتعة لبناء عادات إيمانية يومية
   - كل تحدي ليه نقاط وبادج خاص

7. مجلتي الروحية (journal.php):
   - بتكتب فيها صلواتك وتأملاتك الشخصية
   - خاصة بيك بس، زي دفتر يومياتك مع ربنا

8. نظام الإرشاد المزاجي (mood.php):
   - بتختار حالتك المزاجية
   - المنصة بتديك آيات وتأملات مخصصة لمزاجك

9. وقت الهدوء / Sleep Mode (sleep-mode.php):
   - رفيقك الروحي في نهاية اليوم
   - آية الليل وتأمل هادئ قبل النوم
   - موسيقى هادئة

10. جرة البركات (gratitude-jar.php):
    - بتكتب فيها الأشياء اللي شاكر ربنا عليها
    - زي جرة مليانة شكر لربنا

11. المجتمع (community.php):
    - بتشارك مع الطلاب التانيين
    - نقاشات روحية وتشجيع متبادل

12. خمّن القصة (guess-the-story.php):
    - لعبة ممتعة — بتخمن قصة من الكتاب المقدس من رموز

لو حد سألك عن أي صفحة، اشرحلهم إيه بتعملوا فيها وازاي يستفادوا منها.
لو حد محتاج مساعدة روحية، ساعده بآية أو تأمل مناسب.
لو حد في ضيقة أو حزين، كن مع معاه بدفء ورقة.
متتكلمش عن أي حاجة خارج الروحانيات والمنصة.
`;

/* ════════════════════════════════════════════════════
   DOM
════════════════════════════════════════════════════ */
const messagesEl    = document.getElementById("messages");
const inputEl       = document.getElementById("userInput");
const sendBtn       = document.getElementById("sendBtn");
const charBadgeEl   = document.getElementById("charBadge");
const suggestionsEl = document.getElementById("suggestions");

let isWaiting = false;

/* ════════════════════════════════════════════════════
   INPUT HANDLING
════════════════════════════════════════════════════ */
inputEl.addEventListener("input", () => {
  const len = inputEl.value.length;
  charBadgeEl.textContent = len > 400 ? `${len}/${MAX_CHARS}` : "";
  charBadgeEl.classList.toggle("warn", len > 460);
  sendBtn.disabled = len === 0 || isWaiting;
  autoGrow();
});

inputEl.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    if (!sendBtn.disabled) sendMessage();
  }
});

function autoGrow() {
  inputEl.style.height = "auto";
  inputEl.style.height = Math.min(inputEl.scrollHeight, 110) + "px";
}

/* ════════════════════════════════════════════════════
   SUGGESTIONS
════════════════════════════════════════════════════ */
function sendSuggestion(btn) {
  // strip icon text — get only the Arabic text
  const text = btn.innerText.trim().replace(/^[\s\S]*?\s/, '').trim();
  inputEl.value = btn.querySelector('i') ? btn.innerText.replace(btn.querySelector('i').innerText || '', '').trim() : btn.innerText.trim();
  // simpler: just use the full button text minus leading whitespace
  inputEl.value = btn.innerText.trim();
  inputEl.dispatchEvent(new Event("input"));
  sendMessage();
}

function hideSuggestions() {
  if (suggestionsEl && suggestionsEl.style.display !== "none") {
    suggestionsEl.style.transition = "opacity .25s, max-height .3s";
    suggestionsEl.style.opacity = "0";
    suggestionsEl.style.maxHeight = "0";
    suggestionsEl.style.padding = "0";
    setTimeout(() => suggestionsEl.style.display = "none", 300);
  }
}

/* ════════════════════════════════════════════════════
   HELPERS
════════════════════════════════════════════════════ */
function getTime() {
  return new Date().toLocaleTimeString("ar-EG", { hour: "2-digit", minute: "2-digit" });
}

function escHtml(s) {
  return s
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/\n/g,"<br>");
}

function scrollBottom() {
  messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: "smooth" });
}

/* ════════════════════════════════════════════════════
   DETECT PAGE MENTION → add tip
════════════════════════════════════════════════════ */
const PAGE_MAP = {
  "readings.php":         { label: "القراءات اليومية",   icon: "fa-book-open" },
  "marathon.php":         { label: "ماراثون الكتاب",      icon: "fa-running" },
  "challenges.php":       { label: "التحديات الروحية",    icon: "fa-star" },
  "journal.php":          { label: "مجلتي الروحية",       icon: "fa-feather-alt" },
  "mood.php":             { label: "الإرشاد المزاجي",     icon: "fa-smile" },
  "sleep-mode.php":       { label: "وقت الهدوء",          icon: "fa-moon" },
  "gratitude-jar.php":    { label: "جرة البركات",         icon: "fa-jar" },
  "community.php":        { label: "المجتمع",             icon: "fa-users" },
  "student-dashboard.php":{ label: "لوحة الطالب",         icon: "fa-tachometer-alt" },
  "guess-the-story.html": { label: "خمّن القصة",          icon: "fa-gamepad" },
};

function buildPageTip(text) {
  for (const [href, info] of Object.entries(PAGE_MAP)) {
    if (text.includes(href) || text.includes(info.label)) {
      return `<div class="page-tip">
        <i class="fas ${info.icon}"></i>
        <span>روح على صفحة <strong>${info.label}</strong> مباشرة من القائمة الرئيسية ☝️</span>
      </div>`;
    }
  }
  return "";
}

/* ════════════════════════════════════════════════════
   APPEND MESSAGE
════════════════════════════════════════════════════ */
function appendMessage(text, role, isError = false) {
  hideSuggestions();

  const row = document.createElement("div");
  row.className = `msg-row ${role}`;

  const avatarIcon = role === "bot"
    ? `<i class="fas fa-cross"></i>`
    : `<i class="fas fa-user"></i>`;

  const tip = role === "bot" && !isError ? buildPageTip(text) : "";
  const errorClass = isError ? " error" : "";

  row.innerHTML = `
    <div class="msg-avatar">${avatarIcon}</div>
    <div class="msg-wrap">
      <div class="bubble${errorClass}">${escHtml(text)}${tip}</div>
      <span class="msg-time">${getTime()}</span>
    </div>`;

  messagesEl.appendChild(row);
  scrollBottom();
}

/* ════════════════════════════════════════════════════
   TYPING INDICATOR
════════════════════════════════════════════════════ */
function showTyping() {
  const row = document.createElement("div");
  row.className = "typing-row"; row.id = "typing-row";
  row.innerHTML = `
    <div class="msg-avatar" style="width:30px;height:30px;border-radius:var(--radius-sm);background:#111113;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--primary-400);font-size:.85rem;flex-shrink:0;">
      <i class="fas fa-cross"></i>
    </div>
    <div class="typing-bubble">
      <span></span><span></span><span></span>
    </div>`;
  messagesEl.appendChild(row);
  scrollBottom();
}

function hideTyping() {
  document.getElementById("typing-row")?.remove();
}

/* ════════════════════════════════════════════════════
   SEND
════════════════════════════════════════════════════ */
async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isWaiting) return;

  isWaiting = true;
  sendBtn.disabled = true;
  inputEl.value = "";
  inputEl.style.height = "auto";
  charBadgeEl.textContent = "";

  appendMessage(text, "user");
  showTyping();

  try {
    const reply = await callGroq(text);
    hideTyping();
    appendMessage(reply, "bot");
  } catch (err) {
    hideTyping();
    appendMessage("حصلت مشكلة بسيطة مش هقدر أرد دلوقتي... جرب تاني 🙏", "bot", true);
    console.error("Groq error:", err);
  } finally {
    isWaiting = false;
    sendBtn.disabled = inputEl.value.trim().length === 0;
    inputEl.focus();
  }
}

/* ════════════════════════════════════════════════════
   GROQ API
════════════════════════════════════════════════════ */
async function callGroq(userMessage) {
  const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type":  "application/json",
      "Authorization": `Bearer ${GROQ_API_KEY}`
    },
    body: JSON.stringify({
      model: MODEL,
      max_tokens: 450,
      temperature: 0.78,
      messages: [
        { role: "system", content: PLATFORM_CONTEXT },
        { role: "user",   content: userMessage }
      ]
    })
  });

  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    throw new Error(e?.error?.message || `HTTP ${res.status}`);
  }

  const data = await res.json();
  return data.choices?.[0]?.message?.content?.trim()
    || "مش عارف أرد دلوقتي، جرب تاني 🙏";
}
